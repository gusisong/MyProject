<!DOCTYPE html>
<html>
<head>
    <title>AI Snake Prototype</title>
    <style>
        body { background: #1a1c2c; display: flex; flex-direction: column; align-items: center; color: #fff; font-family: monospace; }
        #ui { width: 400px; display: flex; justify-content: space-between; padding: 10px; }
        #health-bar { display: flex; gap: 2px; }
        .hp-segment { width: 10px; height: 10px; background: #ff0044; border: 1px solid #000; }
        .hp-segment.lost { background: #333; }
        canvas { border: 4px solid #333; image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-bar"></div>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = 20;

        function drawBackground() {
            ctx.fillStyle = '#1a1c2c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222';
            for(let i=0; i<tileCount; i++) {
                for(let j=0; j<tileCount; j++) {
                    ctx.strokeRect(i*gridSize, j*gridSize, gridSize, gridSize);
                }
            }
        }
        drawBackground();

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let health = 20;
        let score = 0;
        let dx = 0;
        let dy = 0;

        function updateHealthUI() {
            const bar = document.getElementById('health-bar');
            bar.innerHTML = '';
            for(let i=0; i<20; i++) {
                const seg = document.createElement('div');
                seg.className = 'hp-segment' + (i >= health ? ' lost' : '');
                bar.appendChild(seg);
            }
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Ensure food doesn't spawn on snake
            if (snake.some(s => s.x === food.x && s.y === food.y)) {
                spawnFood();
            }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            health = 20;
            score = 0;
            dx = 0;
            dy = 0;
            spawnFood();
            updateHealthUI();
            document.getElementById('score').innerText = `Score: ${score}`;
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return true; // Don't move if no direction

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                health--;
                updateHealthUI();
                if (health <= 0) {
                    alert('Game Over: Out of health!');
                    resetGame();
                }
                return false; 
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                alert('Game Over: Bit yourself!');
                resetGame();
                return false;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').innerText = `Score: ${score}`;
                spawnFood();
            } else {
                snake.pop();
            }
            return true;
        }

        // Initial UI setup
        updateHealthUI();
    </script>
</body>
</html>
