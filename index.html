<!DOCTYPE html>
<html>
<head>
    <title>AI Snake Prototype</title>
    <style>
        body { background: #1a1c2c; display: flex; flex-direction: column; align-items: center; color: #fff; font-family: monospace; }
        #ui { width: 400px; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #leaderboard { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #444; border-radius: 5px; width: 100%; margin-top: 10px; box-sizing: border-box; }
        .leaderboard-title { text-align: center; color: #ffcc00; margin-bottom: 8px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; }
        .leaderboard-item span.rank { color: #fff; width: 25px; }
        .leaderboard-item span.score { color: #00ff88; flex-grow: 1; text-align: left; margin-left: 10px; }
        .leaderboard-item span.date { color: #666; font-size: 10px; }
        canvas { border: 4px solid #333; image-rendering: pixelated; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="leaderboard"></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = 20;

        function drawBackground() {
            ctx.fillStyle = '#1a1c2c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222';
            for(let i=0; i<tileCount; i++) {
                for(let j=0; j<tileCount; j++) {
                    ctx.strokeRect(i*gridSize, j*gridSize, gridSize, gridSize);
                }
            }
        }

        const FOOD_TYPES = {
            NORMAL: { color: '#ff0044', score: 1, duration: 3500, chance: 0.7, minRadius: 15 },
            RARE: { color: '#ffcc00', score: 3, duration: 2500, chance: 0.2, minRadius: 10 },
            LEGENDARY: { color: '#aa00ff', score: 10, duration: 1400, chance: 0.1, minRadius: 5 }
        };

        let snakes = [];
        let foods = [];
        let score = 0;
        let leaderboard = [];
        let pendingSpawnCount = 0;
        const namePool = ['Apollo', 'Blaze', 'Comet', 'Dash', 'Echo', 'Falcon', 'Ghost', 'Hunter', 'Icarus', 'Joker', 'Krypton', 'Luna', 'Mars', 'Nova', 'Orion', 'Pulse', 'Quartz', 'Rider', 'Storm', 'Titan'];
        let usedNames = new Set();

        function initSnake(name, body = [{x: 10, y: 10}]) {
            return {
                body: body,
                name: name,
                dx: 0,
                dy: 0,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            };
        }

        function isOccupied(x, y, excludeSnake = null) {
            return snakes.some(s => {
                if (s === excludeSnake) {
                    // When checking for a specific snake's own future move, 
                    // we only care about its body except the head (which will move)
                    // and the tail (which will usually move out, unless it just ate)
                    // But for simplicity, we check the whole body but allow the caller to exclude
                    return s.body.some(b => b.x === x && b.y === y);
                }
                return s.body.some(b => b.x === x && b.y === y);
            });
        }

        function spawnFood() {
            const maxFoods = 3;
            const currentActive = foods.length;
            const totalExistingOrPending = currentActive + pendingSpawnCount;

            if (totalExistingOrPending < maxFoods) {
                const needed = maxFoods - totalExistingOrPending;
                for (let i = 0; i < needed; i++) {
                    pendingSpawnCount++;
                    const delay = 1000 + Math.random() * 2000;
                    setTimeout(() => {
                        spawnOneFood();
                        pendingSpawnCount--;
                    }, delay);
                }
            }
        }

        function spawnOneFood(retryCount = 0) {
            if (retryCount > 20) return;
            
            const typeRoll = Math.random();
            let type;
            if (typeRoll < FOOD_TYPES.LEGENDARY.chance) {
                type = "LEGENDARY";
            } else if (typeRoll < FOOD_TYPES.LEGENDARY.chance + FOOD_TYPES.RARE.chance) {
                type = "RARE";
            } else {
                type = "NORMAL";
            }

            const nx = Math.floor(Math.random() * tileCount);
            const ny = Math.floor(Math.random() * tileCount);

            const occupied = isOccupied(nx, ny) || foods.some(f => f.x === nx && f.y === ny);
            
            let farEnough = true;
            const config = FOOD_TYPES[type];
            let minR = config.minRadius;
            
            if (retryCount > 10) minR /= 2;
            if (retryCount > 15) minR = 0;

            if (minR > 0) {
                farEnough = snakes.every(s => {
                    const head = s.body[0];
                    const dist = Math.abs(head.x - nx) + Math.abs(head.y - ny);
                    return dist >= minR;
                });
            }

            if (!occupied && farEnough) {
                foods.push({
                    x: nx,
                    y: ny,
                    type: type,
                    expires: Date.now() + config.duration
                });
            } else {
                spawnOneFood(retryCount + 1);
            }
        }

        let currentRoundSnakeName = "";

        function updateLeaderboard() {
            if (score > 0) {
                leaderboard.push({
                    score: score, 
                    name: currentRoundSnakeName,
                    date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})
                });
                leaderboard.sort((a, b) => b.score - a.score);
                leaderboard = leaderboard.slice(0, 5);
            }
            
            const lbDiv = document.getElementById('leaderboard');
            let html = '<div class="leaderboard-title">TOP 5 RANKING</div>';
            if (leaderboard.length === 0) {
                html += '<div style="text-align:center; color:#666; font-size:12px;">No records yet</div>';
            } else {
                html += leaderboard.map((l, i) => 
                    `<div class="leaderboard-item">
                        <span class="rank">#${i+1}</span>
                        <span class="score">${l.name}: ${l.score} PTS</span>
                        <span class="date">${l.date}</span>
                    </div>`
                ).join('');
            }
            lbDiv.innerHTML = html;
        }

        let gameRunning = true;
        function resetGame() {
            updateLeaderboard();
            let availableNames = namePool.filter(name => !usedNames.has(name));
            if (availableNames.length === 0) {
                usedNames.clear();
                availableNames = [...namePool];
            }
            currentRoundSnakeName = availableNames[Math.floor(Math.random() * availableNames.length)];
            usedNames.add(currentRoundSnakeName);
            snakes = [initSnake(currentRoundSnakeName)];
            score = 0;
            foods = [];
            spawnFood();
            document.getElementById('score').innerText = `Score: ${score}`;
            gameRunning = true;
        }

        resetGame();

        function moveSnake(snake) {
            if (snake.dx === 0 && snake.dy === 0) return true;

            const head = {x: snake.body[0].x + snake.dx, y: snake.body[0].y + snake.dy};
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                alert(`${snake.name} hit the wall!`);
                resetGame();
                return false; 
            }

            // Global collision detection
            // Check if head hits any body (including its own, but excluding the head's current pos)
            const collision = snakes.some(s => s.body.some((b, i) => {
                // If it's the same snake, ignore the head (index 0)
                if (s === snake && i === 0) return false;
                return b.x === head.x && b.y === head.y;
            }));

            if (collision) {
                alert(`${snake.name} crashed!`);
                gameRunning = false;
                setTimeout(resetGame, 100);
                return false;
            }

            snake.body.unshift(head);
            const foodIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (foodIndex !== -1) {
                const eatenFood = foods[foodIndex];
                score += FOOD_TYPES[eatenFood.type].score;
                document.getElementById('score').innerText = `Score: ${score}`;
                foods.splice(foodIndex, 1);
                spawnFood();
            } else {
                snake.body.pop();
            }
            return true;
        }

        function getPath(snake, target) {
            const start = snake.body[0];
            const openSet = [start];
            const cameFrom = new Map();
            const gScore = {};
            const fScore = {};
            const key = p => `${p.x},${p.y}`;

            gScore[key(start)] = 0;
            fScore[key(start)] = Math.abs(start.x - target.x) + Math.abs(start.y - target.y);

            while (openSet.length > 0) {
                openSet.sort((a, b) => fScore[key(a)] - fScore[key(b)]);
                const current = openSet.shift();

                if (current.x === target.x && current.y === target.y) {
                    const path = [];
                    let curr = current;
                    while (cameFrom.has(key(curr))) {
                        path.push(curr);
                        curr = cameFrom.get(key(curr));
                    }
                    return path.reverse();
                }

                const neighbors = [
                    {x: current.x+1, y: current.y}, {x: current.x-1, y: current.y},
                    {x: current.x, y: current.y+1}, {x: current.x, y: current.y-1}
                ].filter(p => p.x >= 0 && p.x < tileCount && p.y >= 0 && p.y < tileCount)
                 .filter(p => {
                     // In A* pathfinding, we need to avoid all snake bodies.
                     // However, we should be careful not to block ourselves by our own head's current position
                     // or the current positions of other heads if they are moving.
                     // For A*, let's just use the strict isOccupied.
                     return !isOccupied(p.x, p.y);
                 });

                for (let neighbor of neighbors) {
                    let tentativeGScore = gScore[key(current)] + 1;
                    if (tentativeGScore < (gScore[key(neighbor)] || Infinity)) {
                        cameFrom.set(key(neighbor), current);
                        gScore[key(neighbor)] = tentativeGScore;
                        fScore[key(neighbor)] = tentativeGScore + Math.abs(neighbor.x - target.x) + Math.abs(neighbor.y - target.y);
                        if (!openSet.some(p => p.x === neighbor.x && p.y === neighbor.y)) {
                            openSet.push(neighbor);
                        }
                    }
                }
            }
            return null;
        }

        function countReachableArea(startX, startY, snake) {
            const queue = [{x: startX, y: startY}];
            const visited = new Set([`${startX},${startY}`]);
            let count = 0;

            while (queue.length > 0) {
                const {x, y} = queue.shift();
                count++;

                const neighbors = [
                    {x: x+1, y: y}, {x: x-1, y: y},
                    {x: x, y: y+1}, {x: x, y: y-1}
                ].filter(p => p.x >= 0 && p.x < tileCount && p.y >= 0 && p.y < tileCount)
                 .filter(p => !isOccupied(p.x, p.y));

                for (let neighbor of neighbors) {
                    const key = `${neighbor.x},${neighbor.y}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push(neighbor);
                    }
                }
            }
            return count;
        }

        function findSurvivalMove(snake) {
            const head = snake.body[0];
            const neighbors = [
                {x: head.x+1, y: head.y}, {x: head.x-1, y: head.y},
                {x: head.x, y: head.y+1}, {x: head.x, y: head.y-1}
            ].filter(p => p.x >= 0 && p.x < tileCount && p.y >= 0 && p.y < tileCount)
             .filter(p => !isOccupied(p.x, p.y));

            if (neighbors.length > 0) {
                let bestMove = neighbors[0];
                let maxArea = -1;
                
                for (let n of neighbors) {
                    const area = countReachableArea(n.x, n.y, snake);
                    if (area > maxArea) {
                        maxArea = area;
                        bestMove = n;
                    }
                }
                snake.dx = bestMove.x - head.x;
                snake.dy = bestMove.y - head.y;
            }
        }

        function draw() {
            drawBackground();
            
            // Draw Foods
            const now = Date.now();
            foods.forEach(f => {
                const config = FOOD_TYPES[f.type];
                const timeLeft = f.expires - now;
                
                // Flicker effect when less than 25% time remains
                if (timeLeft < config.duration * 0.25) {
                    if (Math.floor(now / 150) % 2 === 0) return;
                }

                const fx = f.x * gridSize;
                const fy = f.y * gridSize;
                ctx.fillStyle = config.color;
                ctx.fillRect(fx + 2, fy + 2, gridSize - 4, gridSize - 4);
                ctx.fillStyle = '#fff';
                ctx.fillRect(fx + 4, fy + 4, 4, 4);
            });

            // Draw Snakes
            snakes.forEach(snake => {
                const head = snake.body[0];
                
                // Draw Name
                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(snake.name, head.x * gridSize + gridSize/2, head.y * gridSize - 5);

                snake.body.forEach((s, i) => {
                    const sx = s.x * gridSize;
                    const sy = s.y * gridSize;
                    
                    if (i === 0) {
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(sx + 1, sy + 1, gridSize - 2, gridSize - 2);
                        ctx.fillStyle = '#000';
                        ctx.fillRect(sx + 4, sy + 4, 3, 3);
                        ctx.fillRect(sx + 13, sy + 4, 3, 3);
                    } else {
                        ctx.fillStyle = snake.color;
                        ctx.fillRect(sx + 1, sy + 1, gridSize - 2, gridSize - 2);
                        ctx.fillStyle = 'rgba(0,0,0,0.1)';
                        ctx.fillRect(sx + 4, sy + 4, gridSize - 8, gridSize - 8);
                    }
                });
            });
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Remove expired foods
            const now = Date.now();
            foods = foods.filter(f => f.expires > now);
            spawnFood();

            // Use a copy of the snakes array to avoid issues when splitting
            const currentSnakes = [...snakes];
            currentSnakes.forEach((snake, index) => {
                // Dynamic Planning for best target selection
                let bestTarget = null;
                let bestUtility = -1;

                foods.forEach(f => {
                    const d = Math.abs(f.x - snake.body[0].x) + Math.abs(f.y - snake.body[0].y);
                    const timeLeft = f.expires - Date.now();
                    // Travel time T = d * 100 ms
                    if (d * 100 < timeLeft) {
                        const utility = (FOOD_TYPES[f.type].score * 100) / (d + 1);
                        if (utility > bestUtility) {
                            bestUtility = utility;
                            bestTarget = f;
                        }
                    }
                });

                if (bestTarget) {
                    const path = getPath(snake, bestTarget);
                    if (path && path.length > 0) {
                        const nextStep = path[0];
                        const areaAfterMove = countReachableArea(nextStep.x, nextStep.y, snake);
                        
                        // Safety threshold: area should be at least snake's length to avoid trapping
                        if (areaAfterMove >= snake.body.length) {
                            snake.dx = nextStep.x - snake.body[0].x;
                            snake.dy = nextStep.y - snake.body[0].y;
                        } else {
                            findSurvivalMove(snake);
                        }
                    } else {
                        findSurvivalMove(snake);
                    }
                } else {
                    findSurvivalMove(snake);
                }
                
                moveSnake(snake);
            });
            draw();
            setTimeout(gameLoop, 100);
        }

        gameLoop();
    </script>
</body>
</html>
