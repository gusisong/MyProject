<!DOCTYPE html>
<html>
<head>
    <title>AI Snake Prototype</title>
    <style>
        body { background: #1a1c2c; display: flex; flex-direction: column; align-items: center; color: #fff; font-family: monospace; }
        #ui { width: 400px; display: flex; justify-content: space-between; padding: 10px; }
        #health-bar { display: flex; gap: 2px; }
        .hp-segment { width: 10px; height: 10px; background: #ff0044; border: 1px solid #000; }
        .hp-segment.lost { background: #333; }
        canvas { border: 4px solid #333; image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-bar"></div>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = 20;

        function drawBackground() {
            ctx.fillStyle = '#1a1c2c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222';
            for(let i=0; i<tileCount; i++) {
                for(let j=0; j<tileCount; j++) {
                    ctx.strokeRect(i*gridSize, j*gridSize, gridSize, gridSize);
                }
            }
        }
        drawBackground();

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let health = 20;
        let score = 0;
        let dx = 0;
        let dy = 0;

        function updateHealthUI() {
            const bar = document.getElementById('health-bar');
            bar.innerHTML = '';
            for(let i=0; i<20; i++) {
                const seg = document.createElement('div');
                seg.className = 'hp-segment' + (i >= health ? ' lost' : '');
                bar.appendChild(seg);
            }
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Ensure food doesn't spawn on snake
            if (snake.some(s => s.x === food.x && s.y === food.y)) {
                spawnFood();
            }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            health = 20;
            score = 0;
            dx = 0;
            dy = 0;
            spawnFood();
            updateHealthUI();
            document.getElementById('score').innerText = `Score: ${score}`;
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return true; // Don't move if no direction

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                health--;
                updateHealthUI();
                if (health <= 0) {
                    alert('Game Over: Out of health!');
                    resetGame();
                }
                return false; 
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                alert('Game Over: Bit yourself!');
                resetGame();
                return false;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').innerText = `Score: ${score}`;
                spawnFood();
            } else {
                snake.pop();
            }
            return true;
        }

        // Initial UI setup
        updateHealthUI();

        function getPath(start, target) {
            const openSet = [start];
            const cameFrom = new Map();
            const gScore = {};
            const fScore = {};
            const key = p => `${p.x},${p.y}`;

            gScore[key(start)] = 0;
            fScore[key(start)] = Math.abs(start.x - target.x) + Math.abs(start.y - target.y);

            while (openSet.length > 0) {
                openSet.sort((a, b) => fScore[key(a)] - fScore[key(b)]);
                const current = openSet.shift();

                if (current.x === target.x && current.y === target.y) {
                    const path = [];
                    let curr = current;
                    while (cameFrom.has(key(curr))) {
                        path.push(curr);
                        curr = cameFrom.get(key(curr));
                    }
                    return path.reverse();
                }

                const neighbors = [
                    {x: current.x+1, y: current.y}, {x: current.x-1, y: current.y},
                    {x: current.x, y: current.y+1}, {x: current.x, y: current.y-1}
                ].filter(p => p.x >= 0 && p.x < tileCount && p.y >= 0 && p.y < tileCount)
                 .filter(p => !snake.some(s => s.x === p.x && s.y === p.y));

                for (let neighbor of neighbors) {
                    let tentativeGScore = gScore[key(current)] + 1;
                    if (tentativeGScore < (gScore[key(neighbor)] || Infinity)) {
                        cameFrom.set(key(neighbor), current);
                        gScore[key(neighbor)] = tentativeGScore;
                        fScore[key(neighbor)] = tentativeGScore + Math.abs(neighbor.x - target.x) + Math.abs(neighbor.y - target.y);
                        if (!openSet.some(p => p.x === neighbor.x && p.y === neighbor.y)) {
                            openSet.push(neighbor);
                        }
                    }
                }
            }
            return null;
        }

        function findSurvivalMove() {
            const head = snake[0];
            const neighbors = [
                {x: head.x+1, y: head.y}, {x: head.x-1, y: head.y},
                {x: head.x, y: head.y+1}, {x: head.x, y: head.y-1}
            ].filter(p => p.x >= 0 && p.x < tileCount && p.y >= 0 && p.y < tileCount)
             .filter(p => !snake.some(s => s.x === p.x && s.y === p.y));

            if (neighbors.length > 0) {
                // Simple survival: move to the neighbor that has a path to the tail, 
                // or just the first available neighbor
                const tail = snake[snake.length - 1];
                let bestMove = neighbors[0];
                let maxDist = -1;
                
                for (let n of neighbors) {
                    let dist = Math.abs(n.x - tail.x) + Math.abs(n.y - tail.y);
                    if (dist > maxDist) {
                        maxDist = dist;
                        bestMove = n;
                    }
                }
                dx = bestMove.x - head.x;
                dy = bestMove.y - head.y;
            }
        }

        function draw() {
            drawBackground();
            ctx.fillStyle = '#ff0044';
            ctx.fillRect(food.x*gridSize, food.y*gridSize, gridSize, gridSize);
            ctx.fillStyle = '#33e033';
            snake.forEach(s => ctx.fillRect(s.x*gridSize, s.y*gridSize, gridSize, gridSize));
        }

        function gameLoop() {
            const path = getPath(snake[0], food);
            if (path && path.length > 0) {
                dx = path[0].x - snake[0].x;
                dy = path[0].y - snake[0].y;
            } else {
                findSurvivalMove();
            }
            moveSnake();
            draw();
            if (health > 0) setTimeout(gameLoop, 100);
        }

        gameLoop();
    </script>
</body>
</html>
